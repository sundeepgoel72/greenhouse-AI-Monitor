provider: openai

fallback:
  - gemini
  - plantid

providers:
  openai:
    enabled: true
    model: gpt-4.1
    use_greenhouse_context: true

  gemini:
    enabled: true
    model: gemini-2.5-pro
    use_greenhouse_context: true

  plantid:
    enabled: false

  kindwise:
    enabled: false

  local:
    enabled: false

prompt:
  include_crop: true
  include_age_days: true
  include_temperature: true
  include_humidity: true
  include_lux: true
  include_moisture: true
  include_growth_metrics: true
